version: '3.8'

services:
    nginx:
        image: nginx:latest
        ports:
            - "8080:80"
        volumes:
            - ./nginx/conf.d:/etc/nginx/conf.d
            - ./app:/var/www/html
        depends_on:
            - php
            - wordpress
        networks:
            - app-network

    php:
        image: php:7.4-fpm
        volumes:
            - ./app:/var/www/html
        networks:
            - app-network

    mysql:
        image: mysql:latest
        environment:
            MYSQL_ROOT_PASSWORD: rootpassword
            MYSQL_DATABASE: wordpress
            MYSQL_USER: wordpress
            MYSQL_PASSWORD: wordpress
        volumes:
            - mysql-data:/var/lib/mysql
        networks:
            - app-network

    wordpress:
        build:
            context: .
            dockerfile: Dockerfile
        environment:
            WORDPRESS_DB_USER: root
            WORDPRESS_DB_PASSWORD: rootpassword
            WORDPRESS_DB_NAME: wordpress
            WORDPRESS_DB_HOST: mysql
            WORDPRESS_URL: http://localhost:8080
            WORDPRESS_TITLE: "Wordpress Purified"
            WORDPRESS_ADMIN_USER: admin
            WORDPRESS_ADMIN_PASSWORD: password
            WORDPRESS_ADMIN_EMAIL: admin@example.com
            WORDPRESS_THEME: wordpress-purified
        volumes:
            - ./app:/var/www/html
        depends_on:
            - mysql
        networks:
            - app-network

    node:
        image: node:latest
        volumes:
            - ./app:/usr/src/app
        working_dir: /usr/src/app
        command: npm start
        ports:
            - "3000:3000"
        networks:
            - app-network

volumes:
    mysql-data:

networks:
    app-network:
        driver: bridge